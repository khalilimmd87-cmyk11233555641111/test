# ⚠️ توجه: این workflow واقعاً هیچ push/PR ای به فورک‌ها نمی‌زند — فقط یک
# پیام لاگ می‌گذارد که یادآوری کند upstream آپدیت شده. برای sync واقعی به
# فورک‌ها، باید یک GitHub App/PAT با دسترسی نوشتن به آن ریپوها ست شود که
# فعلاً در این پروژه وجود ندارد. اسم job عوض شد تا گمراه‌کننده نباشد.
name: Notify Upstream Updated (no real fork-sync yet)

on:
  # هر push به main → upstream را آپدیت می‌کند
  push:
    branches: [main]
  # هر ۶ ساعت یک بار چک می‌کند
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to forks (notify GitHub)
        run: |
          echo "✅ Upstream updated at $(date)"
          echo "Forks should use GitHub's 'Sync fork' button or enable auto-sync."
